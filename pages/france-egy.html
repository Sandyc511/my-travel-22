<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Travel Website</title>
  <link rel="stylesheet" href="./france.egy.css">
</head>
<body>

<!-- 🔝 Header -->
<header class="header">
  <h1>LOVE IS ON</h1>
</header>

<!-- 🌄 Hero -->
<section class="hero">
  <img src="./photo/Paris-1.jpeg" alt="France">
  <div class="hero-text">
    <h2>法國婚禮</h2>
    <p>浪漫歐洲婚禮體驗</p>
  </div>
</section>

<!-- 🇯🇵 日本 -->
<section class="section">
  <div class="container">
    <div class="img">
      <img src="./photo/Paris-2.jpeg" alt="Japan">
    </div>
    <div class="text">
      <h2>日本</h2>
      <p>秋季如畫的自然風光，初雪落成的靜謐時刻，日式婚禮充滿細膩與傳統的美感。</p>
      <button>查看更多 →</button>
    </div>
  </div>
</section>

<!-- 🇹🇭 台里 -->
<section class="section reverse">
  <div class="container">
    <div class="img">
      <img src="./photo/Paris.jpeg" alt="Bali">
    </div>
    <div class="text">
      <h2>台里</h2>
      <p>在海天一色的夢幻場景中，打造屬於你們的浪漫婚禮，留下難忘回憶。</p>
      <button>查看更多 →</button>
    </div>
  </div>
</section>

<!-- 🔚 Footer -->
<footer class="footer">
  <p>© 2026 My Travel Website</p>
</footer>

</body>
</html>
