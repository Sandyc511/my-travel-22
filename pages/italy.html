<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./italy.css"/>

</head>
<body>

<!-- 🔝 Header -->
<header class="header">
  <div class="logo">Miramar Travel</div>
  <nav>
    <a href="#">旅行團</a>
    <a href="#">郵輪</a>
    <a href="#">自由行</a>
    <a href="#">酒店</a>
  </nav>
</header>

<!-- 🌄 Banner -->
<section class="banner">
  <img src="./photo/Egypt-1.jpg">
  <div class="banner-text">
    <h1>香港本地遊</h1>
    <p>暢遊香港走遍城市角落與山海</p>
  </div>
</section>

<!-- 主內容 -->
<div class="main">

  <!-- 🧰 左邊篩選 -->
  <aside class="sidebar">
    <h3>篩選</h3>

    <div class="filter">
      <p>價格</p>
      <input type="range">
    </div>

    <div class="filter">
      <p>天數</p>
      <input type="range">
    </div>


  </aside>

  <!-- 📦 右邊列表 -->
  <section class="content">

    <!-- 卡片 1 -->
    <div class="card">
      <img src="./photo/Egypt-2.jpeg">
      <div class="card-info">
        <h3>布吉私人沙灘體驗團</h3>
        <p>輕鬆度假，一天遊</p>
        <span class="price">$369 起</span>
      </div>
</div>
    <!-- 卡片 2 -->
    <div class="card">
      <img src="./photo/Roman-1.jpeg">
      <div class="card-info">
        <h3>海島一日遊</h3>
        <p>陽光與沙灘的完美結合</p>
        <span class="price">$299 起</span>
      </div>


  </section>

</div>

</body>
</html>


</body>
</html>
